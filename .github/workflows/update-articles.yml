name: Update articles weekly

on:
  schedule:
    # Every Friday at 06:00 UTC (09:00 Saudi local time)
    - cron: "0 6 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper (EN + AR)
        run: python scrape_makkah.py

      - name: Commit and push if either articles file changed
        run: |
          if git diff --quiet articles.json articles_ar.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json articles_ar.json
          git commit -m "chore: weekly article refresh ($(date -u +%Y-%m-%d))"
          git push
